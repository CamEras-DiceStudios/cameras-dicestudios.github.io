<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamEras - The Ultimate Retro Camera</title>
    <meta name="description"
        content="Download CamEras, the premium customizable retro camera app with precision aesthetic. Available now on Google Play.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;600&family=Share+Tech&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-overlay"></div>

    <main class="container">
        <div class="glass-card">
            <div class="logo-container">
                <img src="CamEras_logo_name.png" alt="CamEras Logo" class="app-logo">
            </div>

            <p class="app-subtitle">
                Take photos through Era Lenses.<br>
                <span class="highlight">Vintage camera filters in real-time.</span>
            </p>

            <div class="mechanical-divider"></div>

            <div class="app-description">
                <p class="promo-text">SIGN UP NOW to receive FREE LIFETIME ACCESS to CamEras Premium!</p>
                <p>Click the link below to pre-register with Google Play.</p>
                <p class="ios-note">iOS coming soon!</p>
            </div>

            <div class="download-section">
                <!-- Google Play Button -->
                <a href="https://play.google.com/store/apps/details?id=com.cameras.cameras" target="_blank"
                    rel="noopener noreferrer" class="store-button google-play">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg"
                        alt="Get it on Google Play">
                </a>

                <!-- Future iOS Button -->
                <div class="store-button ios-coming-soon">
                    <span class="coming-soon-text">Coming soon to iOS</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Dice Studios. All rights reserved.</p>
    </footer>
</body>

</html>
